# Development infrastructure (spec §16.1).
# The runnable platform does NOT require these services (it uses in-memory /
# SQLite backends). Bring them up to exercise the production backends, then set
# the matching env vars (NEO4J_URI, KAFKA_BOOTSTRAP, DATABASE_URL, ANTHROPIC_BASE_URL).
version: "3.9"
services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

  neo4j:
    image: neo4j:5.19-enterprise
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/changeme
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"

  postgres:
    image: pgvector/pgvector:pg16
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: syber_memory
      POSTGRES_PASSWORD: changeme

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports: ["4000:4000"]
    volumes: ["./litellm/proxy_config.yaml:/app/config.yaml"]
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"

