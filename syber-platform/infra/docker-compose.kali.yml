# Full Kali deployment: Claude Code runs INSIDE a Kali Linux container (with the
# scanning toolchain and the Syber plugin), on the same network as Neo4j / Kafka /
# Postgres. This is the deployment the spec implies for "Claude Code running inside
# a Docker daemon" — booted with Kali because Kali is built for scanning.
#
#   cd syber-platform
#   docker compose -f infra/docker-compose.kali.yml up -d neo4j postgres kafka
#   docker compose -f infra/docker-compose.kali.yml build kali
#   docker compose -f infra/docker-compose.kali.yml run --rm kali        # -> Claude Code in Kali
#
# DEEPSEEK_API_KEY is read from ../.env (the syberAgent/.env you provided).
services:
  neo4j:
    image: neo4j:5.19-enterprise
    environment:
      NEO4J_AUTH: neo4j/changeme
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports: ["7474:7474", "7687:7687"]
    networks: [syber]
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p changeme 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: syber_memory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    ports: ["5432:5432"]
    networks: [syber]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.8.0
    networks: [syber]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      # Advertise the service name so in-network clients (the Kali container) connect.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kali:
    build:
      context: ..                       # build context = syber-platform (bakes the package in)
      dockerfile: infra/kali/Dockerfile
    image: syber-kali:latest
    cap_add:
      - NET_RAW                          # nmap/masscan raw sockets
      - NET_ADMIN
      - SYS_ADMIN                        # Chrome (agent-browser) namespace sandbox
    shm_size: "1gb"                      # Chrome shared memory
    depends_on:
      neo4j: {condition: service_healthy}
      postgres: {condition: service_healthy}
    env_file: ["../../.env"]            # syberAgent/.env -> DEEPSEEK_API_KEY
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme
      DATABASE_URL: postgresql://postgres:changeme@postgres:5432/syber_memory
      KAFKA_BOOTSTRAP: kafka:9092
    networks: [syber]
    stdin_open: true
    tty: true

networks:
  syber:
    driver: bridge
