# Full Kali deployment: Claude Code runs INSIDE a Kali Linux container (with the
# scanning toolchain and the Syber plugin), on the same network as Neo4j / Kafka /
# Postgres. This is the deployment the spec implies for "Claude Code running inside
# a Docker daemon" — booted with Kali because Kali is built for scanning.
#
#   cd syber-platform
#   docker compose -f infra/docker-compose.kali.yml up -d neo4j postgres kafka
#   docker compose -f infra/docker-compose.kali.yml build kali
#   docker compose -f infra/docker-compose.kali.yml run --rm kali        # -> Claude Code in Kali
#
# DEEPSEEK_API_KEY is read from ../.env (the syberAgent/.env you provided).
services:
  neo4j:
    image: neo4j:5.19-enterprise
    environment:
      NEO4J_AUTH: neo4j/changeme
      # graph-data-science plugin REMOVED — all analytics (dijkstra/yens/betweenness) run
      # in-process via NetworkX (graph/store.py); GDS was loaded but never called and is
      # memory-heavy. Dropping it lowers Neo4j RAM + speeds startup.
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      # Cap the JVM: without these Neo4j auto-sizes heap+pagecache off host RAM (2-3GB+).
      # An engagement graph is KB-MB, so these caps are generous and cost NO performance.
      # Tunable if you ever load a huge graph; SYBER_LEAN drops them further.
      NEO4J_server_memory_heap_initial__size: "${SYBER_NEO4J_HEAP:-1g}"
      NEO4J_server_memory_heap_max__size: "${SYBER_NEO4J_HEAP:-1g}"
      NEO4J_server_memory_pagecache_size: "${SYBER_NEO4J_PAGECACHE:-512m}"
    ports: ["7474:7474", "7687:7687"]
    mem_limit: "${SYBER_NEO4J_MEM:-2g}"    # generous ceiling (not a squeeze) against JVM runaway
    networks: [syber]
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p changeme 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: syber_memory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    ports: ["5432:5432"]
    mem_limit: "${SYBER_PG_MEM:-512m}"
    networks: [syber]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:3.8.0
    networks: [syber]
    mem_limit: "${SYBER_KAFKA_MEM:-1g}"
    environment:
      # Cap the Kafka JVM (default grabs ~1GB). The Syber bus carries tiny event volume,
      # so a 512m heap is ample — no throughput cost at this scale.
      KAFKA_HEAP_OPTS: "${KAFKA_HEAP_OPTS:--Xmx512m -Xms256m}"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      # Advertise the service name so in-network clients (the Kali container) connect.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kali:
    build:
      context: ..                       # build context = syber-platform (bakes the package in)
      dockerfile: infra/kali/Dockerfile
    image: syber-kali:latest
    cap_add:
      - NET_RAW                          # nmap/masscan raw sockets
      - NET_ADMIN
      - SYS_ADMIN                        # Chrome (agent-browser) namespace sandbox
    shm_size: "512m"                     # Chrome uses --disable-dev-shm-usage, so it needs little shm
    mem_limit: "${SYBER_KALI_MEM:-6g}"   # generous ceiling (guards runaway; does NOT squeeze the scanners)
    depends_on:
      neo4j: {condition: service_healthy}
      postgres: {condition: service_healthy}
    env_file: ["../../.env"]            # syberAgent/.env -> DEEPSEEK_API_KEY
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme
      DATABASE_URL: postgresql://postgres:changeme@postgres:5432/syber_memory
      KAFKA_BOOTSTRAP: kafka:9092
    # Durable engagement state so the fleet checkpoint survives across passes
    # (syber_fleet.sh runs each pass in a fresh --rm container). The graph itself
    # persists in Neo4j; this keeps task done-status so resume doesn't re-scan.
    volumes:
      - syber-state:/opt/syber-platform/.investigation_state
    networks: [syber]
    stdin_open: true
    tty: true

networks:
  syber:
    driver: bridge

volumes:
  syber-state:
